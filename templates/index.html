<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Vulnerability Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; }
        .card { background: rgba(255,255,255,0.1); border: none; backdrop-filter: blur(10px); }
        .scan-btn { background: linear-gradient(45deg, #ff006e, #3a86ff); border: none; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold"><i class="fas fa-shield-alt"></i> Web Vuln Scanner</h1>
            <p class="lead">Educational Security Testing Tool</p>
        </div>

        <div class="card p-4 mb-4">
            <form id="scanForm">
                <div class="input-group input-group-lg">
                    <input type="text" id="url" class="form-control" placeholder="https://example.com" required>
                    <button type="submit" class="btn scan-btn text-white px-5">
                        <i class="fas fa-play"></i> Scan Now
                    </button>
                </div>
            </form>
        </div>

        <div id="loading" class="text-center d-none">
            <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;"></div>
            <p class="mt-3">Scanning... Please wait</p>
        </div>

        <div id="results" class="d-none">
            <div class="card p-4">
                <h3>Scan Results for <span id="target-url"></span></h3>
                <canvas id="severityChart" height="150"></canvas>
                
                <div id="vuln-list" class="mt-4"></div>
                
                <div class="mt-4">
                    <a id="json-download" class="btn btn-success me-2">Download JSON Report</a>
                    <button onclick="window.print()" class="btn btn-info">Print / Save as PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart;
        
        document.getElementById('scanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('url').value;
            
            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('results').classList.add('d-none');
            
            const formData = new FormData();
            formData.append('url', url);
            
            try {
                const res = await fetch('/scan', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    showResults(data.results, data.report_path);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Scan failed. Check console.');
            }
            
            document.getElementById('loading').classList.add('d-none');
        });
        
        function showResults(results, reportPath) {
            document.getElementById('results').classList.remove('d-none');
            document.getElementById('target-url').textContent = results.target;
            
            // Chart
            const ctx = document.getElementById('severityChart');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Critical', 'High', 'Medium', 'Low'],
                    datasets: [{
                        data: [
                            results.summary.critical || 0,
                            results.summary.high || 0,
                            results.summary.medium || 0,
                            results.summary.low || 0
                        ],
                        backgroundColor: ['#dc3545', '#fd7e14', '#ffc107', '#28a745']
                    }]
                }
            });
            
            // Vulnerabilities list
            const list = document.getElementById('vuln-list');
            list.innerHTML = '<h5>Detected Issues:</h5>';
            
            results.vulnerabilities.forEach(v => {
                const severityColor = v.severity === 'Critical' ? 'danger' : 
                                    v.severity === 'High' ? 'warning' : 'info';
                list.innerHTML += `
                    <div class="alert alert-${severityColor}">
                        <strong>${v.name} (${v.severity})</strong><br>
                        ${v.description}<br>
                        <small><strong>Fix:</strong> ${v.recommendation}</small>
                    </div>`;
            });
            
            // Download link
            document.getElementById('json-download').href = '/reports/' + reportPath.split('/').pop();
            document.getElementById('json-download').download = 'scan-report.json';
        }
    </script>
</body>
</html>
